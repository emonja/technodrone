<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>NODE://STREAK_EXTENSION</title>
    <style>
        :root {
            --bg: #0a0a0a;
            --dim-text: #555; 
            --active-text: #888;
            --pale-highlight: #d1d1d1; 
            --glow-pale: rgba(200, 200, 200, 0.2);
        }

        body {
            background-color: var(--bg);
            color: var(--active-text);
            font-family: 'Courier New', monospace;
            margin: 0;
            height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            -webkit-tap-highlight-color: transparent;
            padding: env(safe-area-inset-top) 20px;
            transition: filter 0.1s ease;
        }

        /* Scanline Overlay Effect */
        body::after {
            content: "";
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(
                rgba(18, 16, 16, 0) 50%, 
                rgba(0, 0, 0, 0.25) 50%
            ), linear-gradient(
                90deg, 
                rgba(255, 0, 0, 0.03), 
                rgba(0, 255, 0, 0.01), 
                rgba(0, 0, 255, 0.03)
            );
            background-size: 100% 3px, 3px 100%;
            pointer-events: none;
            z-index: 100;
        }

        .glitch-active {
            filter: brightness(3) contrast(1.5) grayscale(1);
        }

        .nav-wrapper {
            position: fixed;
            top: calc(env(safe-area-inset-top) + 20px);
            right: 25px;
            z-index: 101;
        }

        .nav-return { 
            text-decoration: none; 
            color: var(--dim-text); 
            font-size: 10px; 
            letter-spacing: 2px;
        }

        .directive-frame {
            border-left: 1px solid #333;
            border-right: 1px solid #333;
            padding: 60px 40px;
            text-align: center;
            max-width: 400px;
            width: 100%;
            box-sizing: border-box;
        }

        .header-tag {
            font-size: 10px;
            color: var(--active-text);
            letter-spacing: 4px;
            margin-bottom: 20px;
            text-transform: uppercase;
        }

        .subject-tag {
            font-size: 10px;
            color: var(--dim-text);
            letter-spacing: 3px;
            margin-bottom: 40px;
        }

        #counter {
            font-size: 110px;
            color: var(--pale-highlight);
            text-shadow: 0 0 15px var(--glow-pale);
            line-height: 0.8;
            font-weight: bold;
            letter-spacing: -2px;
            opacity: 0.9;
        }

        .loop-container {
            margin-top: 40px;
            height: 15px;
        }

        #loop-status {
            font-size: 10px;
            color: var(--active-text);
            letter-spacing: 3px;
            text-transform: uppercase;
        }

        .meta-data {
            margin-top: 50px;
            font-size: 10px;
            color: var(--dim-text);
            line-height: 2.2;
            text-align: left;
            border-top: 1px solid #222;
            padding-top: 20px;
        }

        /* Bandcamp Integration */
        .audio-node {
            margin-top: 30px;
            width: 100%;
            opacity: 0.6;
            filter: grayscale(1) invert(0.1);
            transition: opacity 0.3s ease;
        }
        .audio-node:hover {
            opacity: 1;
        }

        .blink { animation: blinker 1.2s step-start infinite; }
        @keyframes blinker { 50% { opacity: 0; } }

    </style>
</head>
<body id="main-terminal">

    <div class="nav-wrapper">
        <a href="../index.html" class="nav-return">//RETURN_TO_CORE</a>
    </div>

    <div class="directive-frame">
        <div class="header-tag">STREAK_PROPAGATION_NODE</div>
        <div class="subject-tag">SUBJECT_ID: 0011</div>
        
        <div id="counter">---</div>
        
        <div class="loop-container">
            <div id="loop-status">INITIALIZING...</div>
        </div>

        <div class="meta-data">
            DATA_ORIGIN: 14.12.24 <br>
            INHERITED_STATE: <span style="color:#888;">VALID</span> <br>
            STREAK_STATUS: <span class="blink">MAINTAINED</span><br><br>

            GEOLOCK (DD): 54.6509° N / 9.1372° E <br>
            GEOLOCK (DMS): 54° 39' 03.2" N <br>
            &nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;9° 08' 13.9" E
        </div>

        <div class="audio-node">
            <iframe style="border: 0; width: 100%; height: 42px;" src="https://bandcamp.com/EmbeddedPlayer/track=3235654568/size=small/bgcol=0a0a0a/linkcol=888888/transparent=true/" seamless>
                <a href="https://estebandelamonja.bandcamp.com/track/sterne">Sterne by Esteban De la Monja</a>
            </iframe>
        </div>
    </div>

    <script>
        const loopPoints = [
            "SIGNAL_INHERITED",
            "STREAK_PROPAGATING",
            "NODE_0011_ACTIVE",
            "TEMPORAL_LINK_STABLE",
            "SYSTEM_COHERENCE_MAINTAINED"
        ];

        const terminal = document.getElementById('main-terminal');

        function triggerGlitch() {
            terminal.classList.add('glitch-active');
            setTimeout(() => terminal.classList.remove('glitch-active'), 80);
        }

        document.addEventListener('touchstart', triggerGlitch, {passive: true});
        document.addEventListener('mousedown', triggerGlitch);

        function runActivation() {
            // Based on your previous logic
            const originDate = new Date('2025-09-21T00:00:00');
            const now = new Date();
            const actualDays = Math.floor((now - originDate) / (1000 * 60 * 60 * 24));
            
            const counterEl = document.getElementById('counter');
            let tempCount = 0;

            const interval = setInterval(() => {
                if (tempCount >= actualDays) {
                    counterEl.innerText = actualDays.toString().padStart(3, '0');
                    clearInterval(interval);
                    startLoop();
                } else {
                    tempCount += Math.ceil(actualDays / 20);
                    if (tempCount > actualDays) tempCount = actualDays;
                    counterEl.innerText = tempCount.toString().padStart(3, '0');
                }
            }, 30);
        }

        function startLoop() {
            let i = 0;
            const statusEl = document.getElementById('loop-status');
            setInterval(() => {
                statusEl.innerText = loopPoints[i];
                i = (i + 1) % loopPoints.length;
            }, 3500);
        }

        window.onload = runActivation;
    </script>
</body>
</html>
