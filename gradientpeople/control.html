<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>CONTROL://GRID_MASTER</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
:root{
    --bg:#0a0a0a;
    --fg:#d6a15c;
    --line:#333;
}
body{
    margin:0;
    background:var(--bg);
    color:var(--fg);
    font-family:monospace;
    padding:20px;
}
.grid{
    display:grid;
    grid-template-columns:repeat(4,1fr);
    gap:10px;
    margin-bottom:20px;
}
.cell{
    border:1px solid var(--line);
    padding:10px;
    text-align:center;
}
.controls{
    display:flex;
    gap:10px;
    margin-bottom:10px;
}
button{
    border:1px solid var(--fg);
    background:none;
    color:var(--fg);
    padding:10px;
    cursor:pointer;
}
input{
    flex:1;
}
</style>
</head>
<body>

<h3>GRID STATUS</h3>
<div class="grid" id="grid"></div>

<h3>GRADIENT CONTROL</h3>
<div class="controls">
    <input type="color" id="c1" value="#ff0000">
    <input type="color" id="c2" value="#0000ff">
</div>

<div class="controls">
    <button onclick="sendGradient()">APPLY GRADIENT</button>
    <button onclick="resetGrid()">RESET GRID</button>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getDatabase, ref, onValue, set, remove } 
from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

const firebaseConfig = {
  apiKey: "AIzaSyDXZbUQ81jxiGgH89gXdoH7pf2mSxp_rN0",
  authDomain: "technodrone-ce06d.firebaseapp.com",
  databaseURL: "https://technodrone-ce06d-default-rtdb.firebaseio.com",
  projectId: "technodrone-ce06d"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

const gridEl = document.getElementById("grid");

// GRID VIEW
onValue(ref(db,"slots"), (snap)=>{
    const slots = snap.val() || {};
    gridEl.innerHTML = "";

    for(let i=0;i<16;i++){
        const cell = document.createElement("div");
        cell.className = "cell";

        const col = i % 4;
        const row = Math.floor(i/4);
        const letters = ["A","B","C","D"];
        const code = letters[row] + (col+1);

        cell.innerText = slots[i] ? code : "--";
        gridEl.appendChild(cell);
    }
});

// RESET GRID
window.resetGrid = function(){
    remove(ref(db,"slots"));
    remove(ref(db,"system/frame"));
};

// GRADIENT
window.sendGradient = function(){
    const c1 = document.getElementById("c1").value;
    const c2 = document.getElementById("c2").value;

    function lerp(a,b,t){ return a + (b-a)*t; }

    function hexToRgb(hex){
        const bigint = parseInt(hex.slice(1),16);
        return {
            r:(bigint>>16)&255,
            g:(bigint>>8)&255,
            b:bigint&255
        };
    }

    function rgbToHex(r,g,b){
        return "#" + [r,g,b].map(x=>{
            const h = x.toString(16);
            return h.length===1 ? "0"+h : h;
        }).join("");
    }

    const cA = hexToRgb(c1);
    const cB = hexToRgb(c2);

    let frame = [];

    for(let i=0;i<16;i++){
        const t = i/15;

        const r = Math.floor(lerp(cA.r,cB.r,t));
        const g = Math.floor(lerp(cA.g,cB.g,t));
        const b = Math.floor(lerp(cA.b,cB.b,t));

        frame[i] = rgbToHex(r,g,b);
    }

    set(ref(db,"system/frame"), frame);
};
</script>

</body>
</html>
