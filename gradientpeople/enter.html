<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>ENTRY://NODE_ACCESS</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
:root{
    --bg:#000;
    --dim:#222;
    --fg:#bbb;
    --accent:#fe7eaf;
}
body{
    margin:0;
    background:var(--bg);
    color:var(--fg);
    font-family:monospace;
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:center;
    height:100vh;
    text-align:center;
}
.header{
    font-size:11px;
    letter-spacing:3px;
    margin-bottom:40px;
    color:var(--dim);
}
.qr{
    background:#fff;
    padding:12px;
    margin-bottom:30px;
}
.url{
    font-size:10px;
    color:var(--dim);
    margin-top:10px;
}
.footer{
    position:absolute;
    bottom:20px;
    font-size:10px;
    color:#111;
}
.blink{
    animation: blink 1.2s step-start infinite;
}
@keyframes blink{
    50%{opacity:0;}
}
</style>
</head>
<body>

<div class="header">
NODE ACCESS // SCAN TO JOIN
</div>

<div class="qr">
    <img src="https://api.qrserver.com/v1/create-qr-code/?size=300x300&data=https://emonja.github.io/technodrone/gradientpeople/user">
</div>

<div class="url">
http://YOUR_IP:8000/user.html
</div>

<div class="footer">
WAIT FOR SIGNAL <span class="blink">_</span>
</div>

</body>
</html>
