<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>SEHNSUCHT GEO TRACE</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>

<style>
body{
    margin:0;
    background:#0b0a07;
    color:#d6a15c;
    font-family: monospace;
}

#map{
    width:100vw;
    height:100vh;
}
</style>
</head>

<body>

<div id="map"></div>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getDatabase, ref, onChildAdded } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

const firebaseConfig = {
apiKey: "AIzaSyDXZbUQ81jxiGgH89gXdoH7pf2mSxp_rN0",
authDomain: "technodrone-ce06d.firebaseapp.com",
databaseURL: "https://technodrone-ce06d-default-rtdb.firebaseio.com",
projectId: "technodrone-ce06d",
appId: "1:869296657162:web:7e0bf1093fc59d4a99a0f3"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

const map = L.map('map').setView([20, -103], 5);

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',{
maxZoom:19
}).addTo(map);

let path = [];
let polyline = L.polyline(path,{color:'#ff4e00'}).addTo(map);

let marker;

const traceRef = ref(db,"geo_trace");

onChildAdded(traceRef,(data)=>{

const p = data.val();

const coord = [p.lat,p.lng];

path.push(coord);

polyline.setLatLngs(path);

if(!marker){
marker = L.marker(coord).addTo(map);
map.setView(coord,15);
}
else{
marker.setLatLng(coord);
}

});

</script>

</body>
</html>
