<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>SEHNSUCHT OBJECT</title>

<style>
body{
    margin:0;
    background:#0b0a07;
    overflow:hidden;
}
canvas{
    display:block;
}
</style>
</head>

<body>

<script type="module">

import * as THREE from "https://unpkg.com/three@0.160.0/build/three.module.js";
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getDatabase, ref, onChildAdded } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

//// FIREBASE
const firebaseConfig = {
apiKey: "AIzaSyDXZbUQ81jxiGgH89gXdoH7pf2mSxp_rN0",
authDomain: "technodrone-ce06d.firebaseapp.com",
databaseURL: "https://technodrone-ce06d-default-rtdb.firebaseio.com",
projectId: "technodrone-ce06d",
appId: "1:869296657162:web:7e0bf1093fc59d4a99a0f3"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

//// THREE SCENE
const scene = new THREE.Scene();

const camera = new THREE.PerspectiveCamera(
    60,
    window.innerWidth/window.innerHeight,
    0.1,
    1000
);

camera.position.set(0,0,60);

const renderer = new THREE.WebGLRenderer({antialias:true});
renderer.setSize(window.innerWidth,window.innerHeight);
document.body.appendChild(renderer.domElement);

//// GEOMETRY
let positions = [];
let geometry = new THREE.BufferGeometry();

let material = new THREE.LineBasicMaterial({
    color: 0xff4e00,
    transparent:true,
    opacity:0.6
});

let line = new THREE.Line(geometry, material);
scene.add(line);

//// POINTS (particles)
let pointsMaterial = new THREE.PointsMaterial({
    color:0xff4e00,
    size:0.8,
    transparent:true,
    opacity:0.8
});

let pointsMesh = new THREE.Points(geometry, pointsMaterial);
scene.add(pointsMesh);

//// MOVEMENT LOGIC
let prev = null;
let x = 0;
let y = 0;
let z = 0;

const scale = 10000;
const zStep = 0.5;

const traceRef = ref(db,"geo_trace");

onChildAdded(traceRef,(data)=>{

    const p = data.val();

    if(prev){

        const dx = (p.lng - prev.lng) * scale;
        const dy = (p.lat - prev.lat) * scale;

        x += dx;
        y -= dy;
        z += zStep;

        positions.push(x,y,z);

        geometry.setAttribute(
            'position',
            new THREE.Float32BufferAttribute(positions,3)
        );

        geometry.computeBoundingSphere();
    }

    prev = p;

});

//// ANIMATION
function animate(){

    requestAnimationFrame(animate);

    // slow sculptural rotation
    scene.rotation.y += 0.002;
    scene.rotation.x += 0.0005;

    // subtle breathing zoom
    camera.position.z = 60 + Math.sin(Date.now()*0.001)*5;

    renderer.render(scene,camera);
}

animate();

//// RESIZE
window.addEventListener('resize',()=>{
    camera.aspect = window.innerWidth/window.innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(window.innerWidth,window.innerHeight);
});

</script>

</body>
</html>
