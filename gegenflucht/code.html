<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>NODE://GEGENFLUCHT</title>
<style>
    :root { 
        --bg: #000; 
        --text: #555; 
        --active: #ff3366; 
        --dim: rgba(255, 51, 102, 0.08);
    }
    body { 
        background: var(--bg); 
        color: var(--text); 
        font-family: 'Courier New', monospace; 
        margin: 0; 
        height: 100vh; 
        display: flex; 
        flex-direction: column; 
        align-items: center; 
        justify-content: center; 
        overflow: hidden;
    }
    header { 
        position: fixed; 
        top: 30px; 
        letter-spacing: 4px; 
        font-size: 11px; 
        text-transform: uppercase; 
        opacity: 0.6;
    }
    #game-container { 
        position: relative; 
        border: 2px solid var(--text); 
        padding: 12px;
    }
    canvas { 
        display: block; 
        background: #000; 
        image-rendering: pixelated;
    }
    #ui { 
        width: 300px; 
        display: flex; 
        justify-content: space-between; 
        font-size: 11px; 
        letter-spacing: 1px; 
        margin-bottom: 8px;
    }
    #message {
        position: absolute;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
        font-size: 13px;
        color: var(--active);
        text-align: center;
        pointer-events: none;
        opacity: 0;
        transition: opacity 0.4s;
        text-shadow: 0 0 8px var(--active);
    }
    button {
        margin-top: 30px;
        background: transparent;
        border: 1px solid var(--active);
        color: var(--active);
        padding: 14px 32px;
        font-family: 'Courier New', monospace;
        letter-spacing: 2px;
        cursor: pointer;
        font-size: 13px;
    }
    button:hover {
        background: var(--active);
        color: #000;
    }
</style>
</head>
<body>

<header>NODE://GEGENFLUCHT</header>

<div id="game-container">
    <div id="ui">
        <span>NODES: <span id="count">1</span></span>
        <span>SURVIVAL: <span id="stability">100</span>%</span>
    </div>
    <canvas id="gameCanvas" width="300" height="420"></canvas>
    <div id="message"></div>
</div>

<button id="init-btn">BEGIN SURVIVAL SEQUENCE</button>

<script>
// ==================== GEGENFLUCHT ====================
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');
const stabilityEl = document.getElementById('stability');
const countEl = document.getElementById('count');
const messageEl = document.getElementById('message');
const initBtn = document.getElementById('init-btn');

let audioCtx, drone, neurosis, masterGain;
let balls = [];
let stability = 100;
let gameOver = false;
let masterHits = 0;

const F_SHARP = 46.25; // deep F#1

function initAudio() {
    if (audioCtx) return;
    audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    
    drone = audioCtx.createOscillator();
    neurosis = audioCtx.createOscillator();
    masterGain = audioCtx.createGain();
    
    drone.type = 'sawtooth';
    neurosis.type = 'square';
    
    drone.frequency.setValueAtTime(F_SHARP, audioCtx.currentTime);
    neurosis.frequency.setValueAtTime(F_SHARP * 2, audioCtx.currentTime);
    
    masterGain.gain.value = 0.012;
    
    drone.connect(masterGain);
    neurosis.connect(masterGain);
    masterGain.connect(audioCtx.destination);
    
    drone.start();
    neurosis.start();
}

function updateAudio() {
    if (!audioCtx) return;
    const strain = (balls.length - 1) * 12 + (100 - stability);
    const newFreq = F_SHARP * (1 + strain / 90);
    
    neurosis.frequency.setTargetAtTime(newFreq * 1.8, audioCtx.currentTime, 0.6);
    masterGain.gain.setTargetAtTime(0.012 + (strain / 2800), audioCtx.currentTime, 0.4);
}

function playHitSound(isMaster) {
    if (!audioCtx) return;
    const o = audioCtx.createOscillator();
    const g = audioCtx.createGain();
    o.type = 'square';
    o.frequency.setValueAtTime(isMaster ? 92 : 184, audioCtx.currentTime);
    g.gain.setValueAtTime(0.035, audioCtx.currentTime);
    g.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.09);
    o.connect(g);
    g.connect(audioCtx.destination);
    o.start();
    o.stop(audioCtx.currentTime + 0.1);
}

// Game objects
const paddle = { x: 120, y: 360, w: 68, h: 14 };
const config = { ballSize: 11, baseSpeed: 3.8 };

function createBall(isMaster = true) {
    return {
        x: canvas.width / 2 + (Math.random() * 60 - 30),
        y: 80,
        dx: (Math.random() > 0.5 ? 1 : -1) * (1.8 + Math.random() * 2.2),
        dy: config.baseSpeed + (balls.length * 0.15),
        isMaster: isMaster
    };
}

function reset() {
    initAudio();
    balls = [createBall(true)];
    stability = 100;
    masterHits = 0;
    gameOver = false;
    initBtn.style.display = 'none';
    updateUI();
}

function updateUI() {
    stabilityEl.textContent = Math.max(0, Math.floor(stability));
    countEl.textContent = balls.length;
    
    if (stability < 30) {
        messageEl.style.opacity = 0.7;
        messageEl.textContent = "YOU ARE DODGING YOURSELF AGAIN";
    } else {
        messageEl.style.opacity = 0;
    }
}

function update() {
    if (gameOver || balls.length === 0) return;
    updateAudio();

    for (let i = balls.length - 1; i >= 0; i--) {
        const b = balls[i];
        b.x += b.dx;
        b.y += b.dy;

        // Wall bounce
        if (b.x <= 0 || b.x + config.ballSize >= canvas.width) {
            b.dx *= -1;
            playHitSound(false);
        }
        if (b.y <= 0) {
            b.dy *= -1;
            playHitSound(false);
        }

        // Bottom hit
        if (b.y + config.ballSize >= canvas.height) {
            b.dy *= -1;
            playHitSound(true);

            if (b.isMaster) {
                masterHits++;
                stability = Math.max(0, stability - 7);
                
                if (masterHits % 4 === 0 && balls.length < 6) {
                    balls.push(createBall(false));
                }
            } else {
                stability = Math.max(0, stability - 4);
            }

            updateUI();
        }

        // Paddle collision = game over (you finally caught yourself)
        if (b.x + config.ballSize > paddle.x && 
            b.x < paddle.x + paddle.w &&
            b.y + config.ballSize > paddle.y && 
            b.y < paddle.y + paddle.h) {
            
            gameOver = true;
            masterGain.gain.setTargetAtTime(0, audioCtx.currentTime, 1.2);
            initBtn.style.display = 'block';
            messageEl.textContent = "YOU FINALLY CAUGHT YOURSELF";
            messageEl.style.opacity = 1;
        }
    }

    if (stability <= 0) {
        gameOver = true;
        initBtn.style.display = 'block';
    }
}

function draw() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);

    // Paddle
    ctx.strokeStyle = '#555';
    ctx.lineWidth = 3;
    ctx.strokeRect(paddle.x, paddle.y, paddle.w, paddle.h);

    // Balls
    balls.forEach(b => {
        ctx.strokeStyle = b.isMaster ? '#ff3366' : '#666';
        ctx.lineWidth = b.isMaster ? 3 : 2;
        ctx.strokeRect(b.x, b.y, config.ballSize, config.ballSize);
    });

    if (gameOver) {
        ctx.fillStyle = '#ff3366';
        ctx.font = 'bold 15px monospace';
        ctx.textAlign = 'center';
        ctx.fillText("SYSTEM COLLAPSE", canvas.width/2, canvas.height/2 - 20);
        ctx.font = '12px monospace';
        ctx.fillText("you survived yourself", canvas.width/2, canvas.height/2 + 20);
    }
}

function loop() {
    update();
    draw();
    requestAnimationFrame(loop);
}

// Input
function movePaddle(e) {
    const rect = canvas.getBoundingClientRect();
    const clientX = e.touches ? e.touches[0].clientX : e.clientX;
    paddle.x = (clientX - rect.left) * (canvas.width / rect.width) - paddle.w / 2;
    if (paddle.x < 0) paddle.x = 0;
    if (paddle.x > canvas.width - paddle.w) paddle.x = canvas.width - paddle.w;
}

canvas.addEventListener('mousemove', movePaddle);
canvas.addEventListener('touchmove', e => { movePaddle(e); e.preventDefault(); }, {passive: false});

initBtn.onclick = reset;

// Start
updateUI();
loop();
</script>
</body>
</html>
