<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Chaos Dodge - Flat Edition</title>
    <style>
        body { 
            display: flex; flex-direction: column; justify-content: center; align-items: center; 
            height: 100vh; margin: 0; background: #f0f0f0; overflow: hidden;
            font-family: 'Courier New', Courier, monospace;
        }
        /* Plain Frame - No Shadow */
        #game-container {
            position: relative;
            background: #fff;
            padding: 10px;
            border: 3px solid black;
        }
        canvas { 
            display: block;
            border: 2px solid black; 
            background: #fff;
            cursor: none;
        }
        #ui { 
            margin-bottom: 10px;
            width: 100%;
            display: flex;
            justify-content: space-between;
            font-weight: bold;
            font-size: 14px;
        }
    </style>
</head>
<body>

    <div id="game-container">
        <div id="ui">
            <span>BALLS: <span id="count">1</span></span>
            <span>TIME: <span id="timer">0</span>s</span>
        </div>
        <canvas id="gameCanvas" width="320" height="480"></canvas>
    </div>

<script>
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');
    const timerElement = document.getElementById('timer');
    const countElement = document.getElementById('count');

    let startTime = Date.now();
    let gameOver = false;
    let masterBallBounceCount = 0;
    let balls = [];

    const config = {
        lineWeight: 2,
        paddleWidth: 50,
        paddleHeight: 12,
        ballSize: 14,
        initialSpeed: 3.8 // Slightly snappier
    };

    const paddle = {
        x: canvas.width / 2 - config.paddleWidth / 2,
        y: canvas.height - 50,
        w: config.paddleWidth,
        h: config.paddleHeight
    };

    function createBall(isExtra = false) {
        return {
            id: isExtra ? "extra" : "master",
            x: canvas.width / 2,
            y: isExtra ? 40 : 120,
            size: config.ballSize,
            // Randomize direction but keep velocity consistent
            dx: (Math.random() > 0.5 ? 1 : -1) * (2 + Math.random() * 3),
            dy: isExtra ? config.initialSpeed : -config.initialSpeed,
            speedMultiplier: 1.0 + (balls.length * 0.03) 
        };
    }

    function resetGame() {
        balls = [createBall(false)];
        masterBallBounceCount = 0;
        startTime = Date.now();
        gameOver = false;
        countElement.innerText = balls.length;
    }

    resetGame();

    function handleMove(e) {
        const rect = canvas.getBoundingClientRect();
        const clientX = e.touches ? e.touches[0].clientX : e.clientX;
        const scaleX = canvas.width / rect.width;
        paddle.x = (clientX - rect.left) * scaleX - paddle.w / 2;

        if (paddle.x < 0) paddle.x = 0;
        if (paddle.x > canvas.width - paddle.w) paddle.x = canvas.width - paddle.w;
        
        if (gameOver) resetGame();
    }

    window.addEventListener('mousemove', handleMove);
    window.addEventListener('touchmove', (e) => {
        handleMove(e);
        e.preventDefault();
    }, { passive: false });

    function update() {
        if (gameOver) return;

        timerElement.innerText = Math.floor((Date.now() - startTime) / 1000);

        balls.forEach(ball => {
            ball.x += ball.dx * ball.speedMultiplier;
            ball.y += ball.dy * ball.speedMultiplier;

            // X-Axis Walls
            if (ball.x <= 0 || ball.x + ball.size >= canvas.width) {
                ball.dx *= -1;
            }
            
            // Top Wall
            if (ball.y <= 0) {
                ball.dy *= -1;
            }

            // Bottom Wall
            if (ball.y + ball.size >= canvas.height) {
                ball.dy *= -1;

                if (ball.id === "master") {
                    masterBallBounceCount++;
                    
                    // Logic fix: Guaranteed ball at 5, then 50% chance thereafter
                    if (masterBallBounceCount % 5 === 0) {
                        const isFirstExtra = balls.length === 1;
                        if (isFirstExtra || Math.random() > 0.5) {
                            balls.push(createBall(true));
                            countElement.innerText = balls.length;
                        }
                    }
                }
            }

            // Collision with Paddle
            if (ball.y + ball.size >= paddle.y && 
                ball.y <= paddle.y + paddle.h &&
                ball.x + ball.size >= paddle.x && 
                ball.x <= paddle.x + paddle.w) {
                gameOver = true;
            }
        });
    }

    function draw() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        ctx.lineWidth = config.lineWeight;
        ctx.strokeStyle = 'black';

        ctx.strokeRect(paddle.x, paddle.y, paddle.w, paddle.h);

        balls.forEach(ball => {
            ctx.strokeRect(ball.x, ball.y, ball.size, ball.size);
        });

        if (gameOver) {
            ctx.fillStyle = "white";
            ctx.fillRect(20, canvas.height/2 - 40, canvas.width - 40, 80);
            ctx.strokeRect(20, canvas.height/2 - 40, canvas.width - 40, 80);
            ctx.textAlign = "center";
            ctx.fillStyle = "black";
            ctx.font = "bold 14px monospace";
            ctx.fillText("SYSTEM HALTED", canvas.width/2, canvas.height/2);
            ctx.font = "10px monospace";
            ctx.fillText("TAP SCREEN TO REBOOT", canvas.width/2, canvas.height/2 + 20);
        }
    }

    function loop() {
        update();
        draw();
        requestAnimationFrame(loop);
    }
    loop();
</script>
</body>
</html>
