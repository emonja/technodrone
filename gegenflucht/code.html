<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>NODE://GEGENFLUCHT</title>
    <style>
        :root { 
            --bg: #000; 
            --text: #444; 
            --active-node: #fe7eaf; 
            --dim-active: rgba(254, 126, 175, 0.1);
            --btn-bg: #111;
            --btn-text: #fe7eaf;
        }
        body.day-mode {
            --bg: #ffffff; --text: #000; --active-node: #0066ff; 
            --dim-active: #e6f0ff; --btn-bg: #000; --btn-text: #fff;
        }
        body { 
            background: var(--bg); color: var(--text); font-family: 'Courier New', monospace; 
            margin: 0; height: 100vh; display: flex; flex-direction: column; 
            align-items: center; justify-content: center; transition: background 1.5s ease; 
            overflow: hidden; -webkit-tap-highlight-color: transparent;
        }
        .nav-wrapper { position: fixed; top: calc(env(safe-area-inset-top) + 20px); right: 20px; z-index: 9999; }
        .nav-return { text-decoration: none; color: var(--text); font-size: 11px; letter-spacing: 1px; }
        header { letter-spacing: 3px; font-size: 11px; margin-bottom: 20px; text-transform: uppercase; }
        #env-info { color: var(--text); transition: color 0.1s; }
        #env-info.flash { color: var(--active-node); font-weight: bold; }
        #game-container { position: relative; background: transparent; padding: 10px; border: 2px solid var(--text); transition: border-color 0.1s; }
        #game-container.flash { border-color: var(--active-node); }
        canvas { display: block; background: transparent; cursor: none; touch-action: none; }
        #ui { margin-bottom: 10px; width: 100%; display: flex; justify-content: space-between; font-size: 11px; letter-spacing: 1px; }
        #init-btn { 
            margin-top: 40px; background: var(--btn-bg); border: 1px solid var(--active-node); 
            color: var(--btn-text); padding: 12px 24px; font-family: 'Courier New', monospace;
            cursor: pointer; letter-spacing: 2px; z-index: 100;
        }
    </style>
</head>
<body>

    <div class="nav-wrapper"><a href="../index.html" class="nav-return">back_to_root</a></div>

    <header>NODE://GEGENFLUCHT | <span id="env-info">STABLE</span></header>

    <div id="game-container">
        <div id="ui">
            <span>NODES: <span id="count">1</span></span>
            <span>STABILITY: <span id="timer">100</span>%</span>
        </div>
        <canvas id="gameCanvas" width="300" height="420"></canvas>
    </div>

    <button id="init-btn">INIT_CORE</button>

<script>
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');
    const timerElement = document.getElementById('timer');
    const countElement = document.getElementById('count');
    const envInfo = document.getElementById('env-info');
    const container = document.getElementById('game-container');
    const initBtn = document.getElementById('init-btn');

    let audioCtx, droneOsc, neurosisOsc, droneGain;
    let balls = [];
    let gameOver = false;
    let masterBounceCount = 0;
    let score = 100;

    const F_SHARP_1 = 46.25; // Deep F#1

    // --- Audio Engine ---
    function initAudio() {
        if(!audioCtx) {
            audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            
            // Base Drone
            droneOsc = audioCtx.createOscillator();
            droneGain = audioCtx.createGain();
            droneOsc.type = 'sawtooth';
            droneOsc.frequency.setValueAtTime(F_SHARP_1, audioCtx.currentTime);
            droneGain.gain.setValueAtTime(0.01, audioCtx.currentTime);
            
            // Neurosis Layer (The one that rises)
            neurosisOsc = audioCtx.createOscillator();
            neurosisOsc.type = 'square';
            neurosisOsc.frequency.setValueAtTime(F_SHARP_1, audioCtx.currentTime);

            droneOsc.connect(droneGain);
            neurosisOsc.connect(droneGain);
            droneGain.connect(audioCtx.destination);

            droneOsc.start();
            neurosisOsc.start();
        }
        if(audioCtx.state === 'suspended') audioCtx.resume();
    }

    function updateDrone() {
        if(!audioCtx) return;
        // Frequency rises based on number of balls and lowering stability
        const strain = (balls.length * 10) + (100 - score);
        const newFreq = F_SHARP_1 * (1 + (strain / 100));
        
        neurosisOsc.frequency.setTargetAtTime(newFreq, audioCtx.currentTime, 0.5);
        // Increase volume slightly as it gets more chaotic
        droneGain.gain.setTargetAtTime(0.01 + (strain / 2000), audioCtx.currentTime, 0.5);
    }

    function playBounceSound(isMaster) {
        if(!audioCtx) return;
        const osc = audioCtx.createOscillator();
        const gain = audioCtx.createGain();
        osc.type = 'square';
        osc.frequency.setValueAtTime(isMaster ? 185.00 : 370.00, audioCtx.currentTime);
        gain.gain.setValueAtTime(0.02, audioCtx.currentTime);
        gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.1);
        osc.connect(gain); gain.connect(audioCtx.destination);
        osc.start(); osc.stop(audioCtx.currentTime + 0.1);
    }

    function triggerFlash() {
        envInfo.classList.add('flash');
        container.classList.add('flash');
        setTimeout(() => {
            envInfo.classList.remove('flash');
            container.classList.remove('flash');
        }, 100);
    }

    // --- Game Engine ---
    const config = { paddleWidth: 60, paddleHeight: 15, ballSize: 12, speed: 3.5 };
    const paddle = { x: 120, y: 360, w: config.paddleWidth, h: config.paddleHeight };

    function createBall(isExtra = false) {
        return {
            id: isExtra ? "extra" : "master",
            x: canvas.width / 2, y: 100, size: config.ballSize,
            dx: (Math.random() > 0.5 ? 1 : -1) * (2 + Math.random() * 2),
            dy: config.speed,
            mult: 1.0 + (balls.length * 0.05)
        };
    }

    function reset() {
        initAudio();
        balls = [createBall(false)];
        masterBounceCount = 0;
        score = 100;
        gameOver = false;
        initBtn.style.display = 'none';
        countElement.innerText = balls.length;
    }

    function handleInput(e) {
        const rect = canvas.getBoundingClientRect();
        const clientX = e.touches ? e.touches[0].clientX : e.clientX;
        paddle.x = (clientX - rect.left) * (canvas.width / rect.width) - paddle.w / 2;
        if(paddle.x < 0) paddle.x = 0;
        if(paddle.x > canvas.width - paddle.w) paddle.x = canvas.width - paddle.w;
        if(gameOver) reset();
    }

    window.addEventListener('mousemove', handleInput);
    window.addEventListener('touchmove', e => { handleInput(e); e.preventDefault(); }, {passive:false});
    initBtn.onclick = reset;

    function update() {
        if(gameOver || balls.length === 0) return;
        updateDrone();

        balls.forEach(b => {
            b.x += b.dx * b.mult;
            b.y += b.dy * b.mult;

            if(b.x <= 0 || b.x + b.size >= canvas.width) { b.dx *= -1; playBounceSound(false); }
            if(b.y <= 0) { b.dy *= -1; playBounceSound(false); }

            if(b.y + b.size >= canvas.height) {
                b.dy *= -1;
                triggerFlash();
                playBounceSound(true);
                if(b.id === "master") {
                    masterBounceCount++;
                    if(masterBounceCount % 5 === 0) {
                        balls.push(createBall(true));
                        countElement.innerText = balls.length;
                    }
                }
                score = Math.max(0, score - 1);
                timerElement.innerText = score;
            }

            if (b.x + b.size >= paddle.x && b.x <= paddle.x + paddle.w &&
                b.y + b.size >= paddle.y && b.y <= paddle.y + paddle.h) {
                gameOver = true;
                if(droneGain) droneGain.gain.setTargetAtTime(0, audioCtx.currentTime, 0.1);
                initBtn.style.display = 'block';
            }
        });
    }

    function draw() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        const style = getComputedStyle(document.body);
        const activeColor = style.getPropertyValue('--active-node');
        const textColor = style.getPropertyValue('--text');

        ctx.lineWidth = 2;
        ctx.strokeStyle = textColor;
        ctx.strokeRect(paddle.x, paddle.y, paddle.w, paddle.h);

        balls.forEach(b => {
            ctx.strokeStyle = (b.id === "master") ? activeColor : textColor;
            ctx.strokeRect(b.x, b.y, b.size, b.size);
        });

        if(gameOver) {
            ctx.fillStyle = activeColor;
            ctx.textAlign = "center";
            ctx.font = "bold 14px monospace";
            ctx.fillText("SYSTEM_HALTED", canvas.width/2, canvas.height/2);
        }
    }

    function loop() { update(); draw(); requestAnimationFrame(loop); }
    
    function checkTime() {
        const h = new Date().getHours();
        if(h >= 7 && h < 19) document.body.classList.add('day-mode');
        else document.body.classList.remove('day-mode');
    }
    checkTime();
    loop();
</script>
</body>
</html>
