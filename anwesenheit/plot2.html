<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>SEHNSUCHT FIELD</title>

<style>
body{
    margin:0;
    background:#0b0a07;
    overflow:hidden;
}
canvas{
    display:block;
}
</style>
</head>

<body>

<canvas id="c"></canvas>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getDatabase, ref, onChildAdded } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

const firebaseConfig = {
apiKey: "AIzaSyDXZbUQ81jxiGgH89gXdoH7pf2mSxp_rN0",
authDomain: "technodrone-ce06d.firebaseapp.com",
databaseURL: "https://technodrone-ce06d-default-rtdb.firebaseio.com",
projectId: "technodrone-ce06d",
appId: "1:869296657162:web:7e0bf1093fc59d4a99a0f3"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

const canvas = document.getElementById("c");
const ctx = canvas.getContext("2d");

resize();
window.addEventListener("resize", resize);

function resize(){
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
}

let x = canvas.width/2;
let y = canvas.height/2;

let prev = null;

const scale = 10000; // sensitivity

const points = [];

const traceRef = ref(db,"geo_trace");

onChildAdded(traceRef,(data)=>{

    const p = data.val();

    if(prev){

        const dx = (p.lng - prev.lng) * scale;
        const dy = (p.lat - prev.lat) * scale;

        x += dx;
        y -= dy; // north up

        points.push({
            x,y,
            time: Date.now()
        });

        draw();
    }

    prev = p;

});

function draw(){

    ctx.fillStyle = "rgba(11,10,7,0.1)";
    ctx.fillRect(0,0,canvas.width,canvas.height);

    const now = Date.now();

    ctx.lineWidth = 0.7;
    ctx.strokeStyle = "#ff4e00";

    ctx.beginPath();

    for(let i=1;i<points.length;i++){

        const age = now - points[i].time;
        const alpha = Math.max(0.05, 1 - age/60000);

        ctx.globalAlpha = alpha;

        ctx.moveTo(points[i-1].x, points[i-1].y);
        ctx.lineTo(points[i].x, points[i].y);
    }

    ctx.stroke();

    // living dots
    points.forEach(p=>{
        const age = now - p.time;
        const alpha = Math.max(0.1, 1 - age/60000);

        const pulse = Math.sin(age * 0.005) * 1.5;

        ctx.beginPath();
        ctx.globalAlpha = alpha;
        ctx.arc(p.x, p.y, 1.5 + pulse, 0, Math.PI*2);
        ctx.fillStyle = "#ff4e00";
        ctx.fill();
    });

    ctx.globalAlpha = 1;
}

</script>

</body>
</html>
