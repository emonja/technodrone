<!DOCTYPE html>
<html>
<head>
    <title>GPS Data Scout</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        #map { height: 500px; width: 100%; border-radius: 8px; }
        body { font-family: sans-serif; padding: 20px; background: #f4f4f4; }
        .controls { background: white; padding: 15px; margin-bottom: 10px; border-radius: 8px; }
    </style>
</head>
<body>

    <div class="controls">
        <h2>📍 GPS Path Explorer</h2>
        <label>Start Date:</label> <input type="date" id="start">
        <label>End Date:</label> <input type="date" id="end">
        <button onclick="processData()">Filter Data</button>
        <span id="count">Points visible: 0</span>
    </div>

    <div id="map"></div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script>
        // Initialize Map centered on Guadalajara area
        const map = L.map('map').setView([20.65, -103.44], 13);
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);
        let layerGroup = L.layerGroup().addTo(map);

        async function processData() {
            const response = await fetch('transmit.json');
            const rawData = await response.json();
            const points = Object.values(rawData);
            
            const start = new Date(document.getElementById('start').value).getTime();
            const end = new Date(document.getElementById('end').value).getTime();

            layerGroup.clearLayers(); // Clear old dots
            
            let visibleCount = 0;
            const pathCoords = [];

            points.forEach(p => {
                // If no date is picked, show all. Otherwise, filter.
                if ((!start || p.timestamp >= start) && (!end || p.timestamp <= end)) {
                    L.circleMarker([p.lat, p.lng], { radius: 3, color: 'blue' }).addTo(layerGroup);
                    pathCoords.push([p.lat, p.lng]);
                    visibleCount++;
                }
            });

            // Draw a line connecting the dots
            if (pathCoords.length > 0) {
                L.polyline(pathCoords, {color: 'red', weight: 1}).addTo(layerGroup);
            }

            document.getElementById('count').innerText = `Points visible: ${visibleCount}`;
        }
    </script>
</body>
</html>
