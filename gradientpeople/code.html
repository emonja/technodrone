<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>NODE://GRID_UNIT</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
:root {
    --bg:#000;
    --dim:#222;
    --active:#bbb;
    --accent:#fe7eaf;
}
body{
    margin:0;
    background:var(--bg);
    color:var(--active);
    font-family:monospace;
    display:flex;
    align-items:center;
    justify-content:center;
    height:100vh;
    overflow:hidden;
}
#label{
    font-size:80px;
    font-weight:bold;
    color:var(--accent);
    text-shadow:0 0 20px rgba(254,126,175,0.5);
}
#status{
    position:absolute;
    bottom:20px;
    font-size:10px;
    color:var(--dim);
}
</style>
</head>
<body>

<div id="label">--</div>
<div id="status">CONNECTING...</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getDatabase, ref, set, onValue, runTransaction, onDisconnect } 
from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

const firebaseConfig = {
  apiKey: "AIzaSyDX...",
  authDomain: "technodrone-ce06d.firebaseapp.com",
  databaseURL: "https://technodrone-ce06d-default-rtdb.firebaseio.com",
  projectId: "technodrone-ce06d",
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

// IDENTITY
const deviceId = localStorage.getItem("node_id") || crypto.randomUUID();
localStorage.setItem("node_id", deviceId);

const labelEl = document.getElementById("label");
const statusEl = document.getElementById("status");

let mySlot = null;

// SLOT CLAIM
runTransaction(ref(db, "slots"), (slots) => {
    if (!slots) slots = {};
    for (let i=0;i<16;i++){
        if (!slots[i]){
            slots[i] = deviceId;
            return slots;
        }
    }
});

// CLEANUP
onDisconnect(ref(db, `slots/${mySlot}`)).remove();

// LISTEN SLOT
onValue(ref(db, "slots"), (snap)=>{
    const slots = snap.val() || {};

    mySlot = Object.keys(slots).find(k => slots[k] === deviceId);

    if (mySlot !== undefined){
        const i = parseInt(mySlot);
        const col = i % 4;
        const row = Math.floor(i/4);

        const letters = ["A","B","C","D"];
        const code = letters[row] + (col+1);

        labelEl.innerText = code;
        statusEl.innerText = "LOCKED_IN";

    } else {
        labelEl.innerText = "--";
        statusEl.innerText = "WAITING_SLOT";
    }
});

// LISTEN SYSTEM (GRADIENT)
onValue(ref(db, "system/frame"), (snap)=>{
    const frame = snap.val();
    if (!frame || mySlot === null) return;

    const color = frame[mySlot];
    if (color){
        document.body.style.background = color;
    }
});
</script>

</body>
</html>
