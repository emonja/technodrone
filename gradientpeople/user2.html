<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>NODE://GRID_UNIT</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
:root {
    --bg:#000;
    --dim:#222;
    --active:#bbb;
    --accent:#fe7eaf;
}
body{
    margin:0;
    background:var(--bg);
    color:var(--active);
    font-family:monospace;
    display:flex;
    align-items:center;
    justify-content:center;
    height:100vh;
    overflow:hidden;
}
#label{
    font-size:80px;
    font-weight:bold;
    color:var(--accent);
    text-shadow:0 0 20px rgba(254,126,175,0.5);
}
#join{
    position:absolute;
    bottom:40px;
    border:1px solid var(--active);
    padding:12px 20px;
    cursor:pointer;
}
#status{
    position:absolute;
    bottom:10px;
    font-size:10px;
    color:var(--dim);
}
#tap{
    position:absolute;
    top:20px;
    right:20px;
    border:1px solid var(--active);
    padding:10px;
    cursor:pointer;
}
</style>
</head>
<body>

<div id="label">--</div>
<div id="join">JOIN GRID</div>
<div id="tap">TAP</div>
<div id="status">IDLE</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getDatabase, ref, onValue, runTransaction, onDisconnect, set } 
from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

const firebaseConfig = {
  apiKey: "AIzaSyDXZbUQ81jxiGgH89gXdoH7pf2mSxp_rN0",
  authDomain: "technodrone-ce06d.firebaseapp.com",
  databaseURL: "https://technodrone-ce06d-default-rtdb.firebaseio.com",
  projectId: "technodrone-ce06d"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

// identity
const deviceId = localStorage.getItem("node_id") || crypto.randomUUID();
localStorage.setItem("node_id", deviceId);

let mySlot = null;
let joined = false;
let slotMap = {};
let allDevices = {};

let currentColor = "#000000";

// UI
const labelEl = document.getElementById("label");
const statusEl = document.getElementById("status");
const joinBtn = document.getElementById("join");
const tapBtn = document.getElementById("tap");

// JOIN
joinBtn.onclick = () => {
    if (joined) return;

    runTransaction(ref(db, "slots"), (slots) => {
        if (!slots) slots = {};
        for (let i=0;i<16;i++){
            if (!slots[i]){
                slots[i] = deviceId;
                return slots;
            }
        }
    });

    joined = true;
    statusEl.innerText = "REQUESTING_SLOT...";
};

// TAP TEMPO
let taps = [];
let bpm = 0;

tapBtn.onclick = () => {
    const now = Date.now();
    taps.push(now);
    if (taps.length > 5) taps.shift();

    if (taps.length >= 2){
        let intervals = [];
        for (let i=1;i<taps.length;i++){
            intervals.push(taps[i] - taps[i-1]);
        }
        const avg = intervals.reduce((a,b)=>a+b,0) / intervals.length;
        bpm = 60000 / avg;

        set(ref(db, `devices/${deviceId}/bpm`), bpm);
        statusEl.innerText = "BPM: " + bpm.toFixed(1);
    }
};

// SLOT LISTENER
onValue(ref(db,"slots"), (snap)=>{
    slotMap = snap.val() || {};

    const found = Object.keys(slotMap).find(k => slotMap[k] === deviceId);

    if (found !== undefined){
        mySlot = parseInt(found);

        const col = mySlot % 4;
        const row = Math.floor(mySlot / 4);
        const letters = ["A","B","C","D"];
        const code = letters[row] + (col+1);

        labelEl.innerText = code;
        statusEl.innerText = "LOCKED_IN";

        onDisconnect(ref(db, `slots/${mySlot}`)).remove();

    } else {
        mySlot = null;
        joined = false;
        labelEl.innerText = "--";
        statusEl.innerText = "IDLE";
        document.body.style.background = "#000";
    }
});

// FRAME LISTENER
onValue(ref(db,"system/frame"), (snap)=>{
    const frame = snap.val();
    if (!frame || mySlot === null) return;

    currentColor = frame[mySlot] || "#000000";
});

// DEVICES LISTENER (for BPM)
onValue(ref(db,"devices"), (snap)=>{
    allDevices = snap.val() || {};
});

// HELPERS
function hexToRgb(hex){
    const bigint = parseInt(hex.slice(1),16);
    return {
        r:(bigint>>16)&255,
        g:(bigint>>8)&255,
        b:bigint&255
    };
}

function rgbStr(r,g,b){
    return `rgb(${r},${g},${b})`;
}

function shiftColor(rgb, factor){
    return {
        r: Math.min(255, rgb.r * factor),
        g: Math.min(255, rgb.g * factor),
        b: Math.min(255, rgb.b * factor)
    };
}

function getNeighborSlots(slot){
    const neighbors = [];

    const col = slot % 4;
    const row = Math.floor(slot / 4);

    if (col > 0) neighbors.push(slot - 1);
    if (col < 3) neighbors.push(slot + 1);
    if (row > 0) neighbors.push(slot - 4);
    if (row < 3) neighbors.push(slot + 4);

    return neighbors;
}

// ANIMATION LOOP
function animate(){
    requestAnimationFrame(animate);

    if (mySlot === null){
        document.body.style.background = "#000";
        return;
    }

    const base = hexToRgb(currentColor);

    let influence = 0;

    const neighbors = getNeighborSlots(mySlot);

    neighbors.forEach(slot => {
        const device = slotMap[slot];
        if (!device) return;

        const bpm = allDevices[device]?.bpm;
        if (!bpm) return;

        const t = performance.now() / 1000;
        const freq = bpm / 60;

        const pulse = (Math.sin(t * freq * Math.PI * 2) + 1) / 2;
        const shaped = Math.pow(pulse, 2);

        influence += shaped;
    });

    influence = influence / 4;

    const center = base;
    const edge = shiftColor(base, 0.6 + influence * 1.2);

    document.body.style.background = `
        radial-gradient(circle at center,
            ${rgbStr(center.r, center.g, center.b)} 0%,
            ${rgbStr(edge.r, edge.g, edge.b)} 80%
        )
    `;
}

animate();
</script>

</body>
</html>
