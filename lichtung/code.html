<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>NODE://LICHTUNG_SQUARE — MORNING_STATE</title>
    <style>
        :root {
            --bg: #000;
            --active: #fe7eaf;
            --dim: #111;
        }

        body {
            background-color: var(--bg);
            color: var(--active);
            font-family: 'Courier New', monospace;
            margin: 0;
            height: 100vh;
            overflow: hidden;
            touch-action: none;
            opacity: 0;
            animation: fadeIn 60s forwards;
        }

        @keyframes fadeIn {
            to { opacity: 1; }
        }

        /* The "Pond" Grid */
        #grid-overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background-image: 
                linear-gradient(var(--dim) 1px, transparent 1px),
                linear-gradient(90deg, var(--dim) 1px, transparent 1px);
            background-size: 40px 40px;
            opacity: 0.3;
            pointer-events: none;
        }

        .object {
            position: absolute;
            font-size: 10px;
            background: var(--bg);
            border: 1px solid var(--active);
            padding: 2px 5px;
            z-index: 10;
        }

        /* Square Wave Ripples — now with color shift */
        .sq-ripple {
            position: absolute;
            border: 1px solid var(--active);
            transform: translate(-50%, -50%);
            pointer-events: none;
            opacity: 0.8;
            animation: 
                pulse-sq 2s ease-out forwards,
                colorShift 60s linear forwards;
        }

        @keyframes pulse-sq {
            0%   { width: 0; height: 0; opacity: 1; border-width: 4px; }
            100% { width: 400px; height: 400px; opacity: 0; border-width: 1px; }
        }

        @keyframes colorShift {
            0%   { border-color: hsl(350, 100%, 70%); } /* pink dawn */
            50%  { border-color: hsl(40, 100%, 80%); }  /* golden morning */
            100% { border-color: hsl(60, 80%, 90%); }   /* clear light */
        }

        header {
            position: fixed;
            top: 25px;
            left: 25px;
            font-size: 9px;
            letter-spacing: 3px;
            color: #444;
            z-index: 100;
        }

        /* Mobile / performance */
        @media (max-width: 600px) {
            .sq-ripple { animation-duration: 1.8s; }
        }
    </style>
</head>
<body>

    <div id="grid-overlay"></div>
    <header>ARCHIVE_LIQUID_STATE // MORNING_STATE // BIT_DEPTH: 1</header>

    <script>
        const symbols = ["■", "▰", "▣", "□", "▲", "▼"];
        let audioCtx;

        function initAudio() {
            if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        }

        function playSquareTone(freq) {
            initAudio();
            
            // Main square wave (harsh)
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.type = 'square';
            osc.frequency.setValueAtTime(freq, audioCtx.currentTime);
            gain.gain.setValueAtTime(0.05, audioCtx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.0001, audioCtx.currentTime + 0.5);
            osc.connect(gain);
            gain.connect(audioCtx.destination);
            osc.start();
            osc.stop(audioCtx.currentTime + 0.5);

            // Lingering harmonic tail (sine, 8 s decay)
            const osc2 = audioCtx.createOscillator();
            const gain2 = audioCtx.createGain();
            osc2.type = 'sine';
            osc2.frequency.setValueAtTime(freq * 1.5, audioCtx.currentTime); // octave + fifth-ish
            gain2.gain.setValueAtTime(0.02, audioCtx.currentTime);
            gain2.gain.exponentialRampToValueAtTime(0.00001, audioCtx.currentTime + 8);
            osc2.connect(gain2);
            gain2.connect(audioCtx.destination);
            osc2.start();
            osc2.stop(audioCtx.currentTime + 8);
        }

        function createSquareRipple(x, y) {
            const count = 3;
            for (let i = 0; i < count; i++) {
                setTimeout(() => {
                    const r = document.createElement('div');
                    r.className = 'sq-ripple';
                    r.style.left = x + 'px';
                    r.style.top = y + 'px';
                    document.body.appendChild(r);

                    playSquareTone(100 + (i * 50));

                    setTimeout(() => r.remove(), 5000);
                }, i * 200);
            }
        }

        window.addEventListener('pointerdown', (e) => {
            const obj = document.createElement('div');
            obj.className = 'object';
            obj.innerText = symbols[Math.floor(Math.random() * symbols.length)];
            obj.style.left = e.clientX + 'px';
            obj.style.top = e.clientY + 'px';
            document.body.appendChild(obj);

            // Extended linger + gentle sink
            obj.animate([
                { transform: 'scale(1)', opacity: 1 },
                { transform: 'scale(0.3) rotate(45deg)', opacity: 0 }
            ], { duration: 4000, easing: 'ease-in-out' }).onfinish = () => {
                createSquareRipple(e.clientX, e.clientY);
                obj.remove();
            };
        }, { passive: true });
    </script>
</body>
</html>
